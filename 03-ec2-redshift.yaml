AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 ETL + Redshift層-不正ログイン監査基盤(ap-northeast-1)

Parameters:
  ProjectName:
    Type: String
    Default: login-audit
    Description: プロジェクト名
  Environment:
    Type: String
    Default: audit
    AllowedValues: [audit,prod,staging,dev]
    Description: 環境名
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: プライベートサブネット1-AZ1
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: プライベートサブネット2-AZ2
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 SSH接続用キーペア名
  RedshiftMasterUsername:
    Type: String
    Default: audit_admin
    Description: Redshiftマスターユーザー名
    MinLength: 1
    MaxLength: 128
  RedshiftMasterPassword:
    Type: String
    NoEcho: true
    Description: Redshiftマスターパスワード(8文字以上)
    MinLength: 8
    MaxLength: 64
  OnPremiseCIDR:
    Type: String
    Default: 10.0.0.0/8
    Description: オンプレ/Tableau接続用CIDR
  StageBucket:
    Type: String
    Description: Redshift Stage用S3バケット名
  NodeType:
    Type: String
    Default: ra3.xlplus
    AllowedValues: [dc2.large,dc2.8xlarge,ra3.xlplus,ra3.4xlarge,ra3.16xlarge]
    Description: Redshiftノードタイプ
  ClusterType:
    Type: String
    Default: single-node
    AllowedValues: [single-node,multi-node]
    Description: Redshiftクラスタータイプ
  NumberOfNodes:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 128
    Description: Redshiftノード数(multi-node時のみ使用)

Conditions:
  IsMultiNode: !Equals [!Ref ClusterType,multi-node]

Mappings:
  RegionMap:
    ap-northeast-1:
      AMI: ami-0d52744d6551d851e

Resources:
  RedshiftSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-${Environment}-redshift-sg
      GroupDescription: Redshiftクラスター用セキュリティグループ
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5439
          ToPort: 5439
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: EC2 ETLからのアクセス
        - IpProtocol: tcp
          FromPort: 5439
          ToPort: 5439
          CidrIp: !Ref OnPremiseCIDR
          Description: オンプレ/Tableauからのアクセス
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  RedshiftSubnetGroup:
    Type: AWS::Redshift::ClusterSubnetGroup
    Properties:
      Description: !Sub ${ProjectName}-${Environment} Redshiftサブネットグループ
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  RedshiftParameterGroup:
    Type: AWS::Redshift::ClusterParameterGroup
    Properties:
      Description: !Sub ${ProjectName}-${Environment} Redshiftパラメータグループ
      ParameterGroupFamily: redshift-1.0
      Parameters:
        - ParameterName: enable_user_activity_logging
          ParameterValue: 'true'
        - ParameterName: require_ssl
          ParameterValue: 'true'
        - ParameterName: max_concurrency_scaling_clusters
          ParameterValue: '1'

  RedshiftServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-redshift-service-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: redshift.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: RedshiftS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadStageFiles
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${StageBucket}
                  - !Sub arn:aws:s3:::${StageBucket}/*
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  AuditRedshiftCluster:
    Type: AWS::Redshift::Cluster
    Properties:
      ClusterIdentifier: !Sub ${ProjectName}-${Environment}-cluster
      DBName: audit
      MasterUsername: !Ref RedshiftMasterUsername
      MasterUserPassword: !Ref RedshiftMasterPassword
      NodeType: !Ref NodeType
      ClusterType: !Ref ClusterType
      NumberOfNodes: !If [IsMultiNode,!Ref NumberOfNodes,!Ref AWS::NoValue]
      ClusterSubnetGroupName: !Ref RedshiftSubnetGroup
      VpcSecurityGroupIds:
        - !Ref RedshiftSecurityGroup
      ClusterParameterGroupName: !Ref RedshiftParameterGroup
      Encrypted: false
      PubliclyAccessible: false
      AutomatedSnapshotRetentionPeriod: 7
      ManualSnapshotRetentionPeriod: 30
      IamRoles:
        - !GetAtt RedshiftServiceRole.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: DataClassification
          Value: Confidential

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-${Environment}-ec2-etl-sg
      GroupDescription: EC2 ETL用セキュリティグループ
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: AWS APIアクセス
        - IpProtocol: tcp
          FromPort: 5439
          ToPort: 5439
          DestinationSecurityGroupId: !Ref RedshiftSecurityGroup
          Description: Redshiftアクセス
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  EC2ETLRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-ec2-etl-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadCloudTrail
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${ProjectName}-ctlogs-${AWS::AccountId}
                  - !Sub arn:aws:s3:::${ProjectName}-ctlogs-${AWS::AccountId}/*
              - Sid: WriteStage
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub arn:aws:s3:::${StageBucket}
                  - !Sub arn:aws:s3:::${StageBucket}/*
        - PolicyName: AthenaAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AthenaQuery
                Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                Resource: !Sub arn:aws:athena:ap-northeast-1:${AWS::AccountId}:workgroup/${ProjectName}-${Environment}-workgroup
              - Sid: GlueCatalog
                Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetTable
                  - glue:GetPartitions
                Resource:
                  - !Sub arn:aws:glue:ap-northeast-1:${AWS::AccountId}:catalog
                  - !Sub arn:aws:glue:ap-northeast-1:${AWS::AccountId}:database/${ProjectName}_${Environment}_db
                  - !Sub arn:aws:glue:ap-northeast-1:${AWS::AccountId}:table/${ProjectName}_${Environment}_db/*
        - PolicyName: RedshiftAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DescribeRedshift
                Effect: Allow
                Action:
                  - redshift:DescribeClusters
                Resource: '*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:ap-northeast-1:${AWS::AccountId}:log-group:/${ProjectName}/${Environment}/*
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  EC2ETLInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${ProjectName}-${Environment}-ec2-etl-profile
      Roles:
        - !Ref EC2ETLRole

  ETLLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /${ProjectName}/${Environment}/etl-jobs
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  EC2ETLInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap,ap-northeast-1,AMI]
      InstanceType: t3.medium
      IamInstanceProfile: !Ref EC2ETLInstanceProfile
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      SubnetId: !Ref PrivateSubnet1
      KeyName: !Ref KeyPairName
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: false
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          dnf install -y python3 python3-pip cronie
          pip3 install boto3 pandas pyarrow redshift_connector
          mkdir -p /opt/audit-etl/scripts
          mkdir -p /opt/audit-etl/config
          mkdir -p /var/log/audit-etl
          touch /opt/audit-etl/scripts/audit_etl.py
          touch /opt/audit-etl/scripts/redshift_init.sql
          touch /opt/audit-etl/config/env.conf
          chmod 755 /opt/audit-etl/scripts
          chmod 644 /opt/audit-etl/scripts/audit_etl.py
          chmod 644 /opt/audit-etl/scripts/redshift_init.sql
          chmod 600 /opt/audit-etl/config/env.conf
          chown -R ec2-user:ec2-user /opt/audit-etl
          cat > /opt/audit-etl/config/env.conf.template << 'EOF'
          export PROJECT_NAME=${ProjectName}
          export ENVIRONMENT=${Environment}
          export ATHENA_WORKGROUP=${ProjectName}-${Environment}-workgroup
          export ATHENA_DATABASE=${ProjectName}_${Environment}_db
          export S3_STAGE_BUCKET=${StageBucket}
          export CLOUDTRAIL_BUCKET=${ProjectName}-ctlogs-${AWS::AccountId}
          export REDSHIFT_ENDPOINT=${ProjectName}-${Environment}-cluster.ap-northeast-1.redshift.amazonaws.com
          export REDSHIFT_DATABASE=audit
          export REDSHIFT_USERNAME=${RedshiftMasterUsername}
          export REDSHIFT_PASSWORD=xxxxxxxx
          export AWS_REGION=ap-northeast-1
          EOF
          chmod 600 /opt/audit-etl/config/env.conf.template
          echo "# 0 5 * * * ec2-user source /opt/audit-etl/config/env.conf && /usr/bin/python3 /opt/audit-etl/scripts/audit_etl.py >> /var/log/audit-etl/cron.log 2>&1" > /etc/cron.d/audit-etl.disabled
          chmod 644 /etc/cron.d/audit-etl.disabled
          systemctl enable crond
          systemctl start crond
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-etl
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: JP1Managed
          Value: 'true'

Outputs:
  RedshiftEndpoint:
    Description: Redshiftクラスターエンドポイント
    Value: !GetAtt AuditRedshiftCluster.Endpoint.Address
    Export:
      Name: !Sub ${ProjectName}-${Environment}-redshift-endpoint
  RedshiftDatabase:
    Description: Redshiftデータベース名
    Value: !GetAtt AuditRedshiftCluster.DBName
    Export:
      Name: !Sub ${ProjectName}-${Environment}-redshift-database
  RedshiftSecurityGroupId:
    Description: RedshiftセキュリティグループID
    Value: !Ref RedshiftSecurityGroup
    Export:
      Name: !Sub ${ProjectName}-${Environment}-redshift-sg-id
  EC2InstanceId:
    Description: EC2インスタンスID
    Value: !Ref EC2ETLInstance
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ec2-instance-id
  EC2PrivateIp:
    Description: EC2プライベートIP
    Value: !GetAtt EC2ETLInstance.PrivateIp
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ec2-private-ip
  EC2SecurityGroupId:
    Description: EC2セキュリティグループID
    Value: !Ref EC2SecurityGroup
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ec2-sg-id
