AWSTemplateFormatVersion: '2010-09-09'
Description: Glue+Athena層-CloudTrailログ検索基盤(ap-northeast-1)

Parameters:
  ProjectName:
    Type: String
    Default: login-audit
    Description: プロジェクト名
  Environment:
    Type: String
    Default: audit
    AllowedValues: [audit,prod,staging,dev]
    Description: 環境名
  QueryLimitGB:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 100
    Description: Athenaクエリスキャン上限(GB)

Resources:
  AuditGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub ${ProjectName}_${Environment}_db
        Description: CloudTrail不正ログイン監査用データベース

  ConsoleLoginTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref AuditGlueDatabase
      TableInput:
        Name: cloudtrail_console_login
        Description: ConsoleLoginイベント専用テーブル
        TableType: EXTERNAL_TABLE
        Parameters:
          EXTERNAL: 'TRUE'
          projection.enabled: 'true'
          projection.year.type: integer
          projection.year.range: 2024,2050
          projection.month.type: integer
          projection.month.range: 1,12
          projection.month.digits: '2'
          projection.day.type: integer
          projection.day.range: 1,31
          projection.day.digits: '2'
          projection.region.type: enum
          projection.region.values: ap-northeast-1,ap-northeast-3,us-east-1,us-east-2,us-west-1,us-west-2,eu-west-1,eu-west-2,eu-west-3,eu-central-1,eu-central-2,ap-southeast-1,ap-southeast-2,ap-southeast-3,ap-southeast-4,ap-south-1,ap-south-2,sa-east-1,ca-central-1,me-south-1,me-central-1,af-south-1
          storage.location.template: !Sub |
            s3://${ProjectName}-ctlogs-${AWS::AccountId}/AWSLogs/${AWS::AccountId}/CloudTrail/${region}/${year}/${month}/${day}/
        PartitionKeys:
          - Name: year
            Type: string
          - Name: month
            Type: string
          - Name: day
            Type: string
          - Name: region
            Type: string
        StorageDescriptor:
          Columns:
            - Name: eventversion
              Type: string
            - Name: useridentity
              Type: struct<type:string,principalid:string,arn:string,accountid:string,invokedby:string,accesskeyid:string,username:string,sessioncontext:struct<attributes:struct<mfaauthenticated:string,creationdate:string>,sessionissuer:struct<type:string,principalid:string,arn:string,accountid:string,username:string>>>
            - Name: eventtime
              Type: string
            - Name: eventsource
              Type: string
            - Name: eventname
              Type: string
            - Name: awsregion
              Type: string
            - Name: sourceipaddress
              Type: string
            - Name: useragent
              Type: string
            - Name: errorcode
              Type: string
            - Name: errormessage
              Type: string
            - Name: requestparameters
              Type: string
            - Name: responseelements
              Type: string
            - Name: additionaleventdata
              Type: string
            - Name: requestid
              Type: string
            - Name: eventid
              Type: string
            - Name: resources
              Type: array<struct<arn:string,accountid:string,type:string>>
            - Name: eventtype
              Type: string
            - Name: apiversion
              Type: string
            - Name: readonly
              Type: string
            - Name: recipientaccountid
              Type: string
            - Name: serviceeventdetails
              Type: string
            - Name: sharedeventid
              Type: string
            - Name: vpcendpointid
              Type: string
          Location: !Sub s3://${ProjectName}-ctlogs-${AWS::AccountId}/AWSLogs/${AWS::AccountId}/CloudTrail/
          InputFormat: com.amazon.emr.cloudtrail.CloudTrailInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: com.amazon.emr.hive.serde.CloudTrailSerde
            Parameters:
              serialization.format: '1'
          Compressed: true
          StoredAsSubDirectories: false

  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-athena-results-${AWS::AccountId}-ap-northeast-1
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldResults
            Status: Enabled
            ExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  AuditAthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-workgroup
      Description: 不正ログイン監査用ワークグループ
      State: ENABLED
      Configuration:
        EnforceWorkGroupConfiguration: true
        ResultConfiguration:
          OutputLocation: !Sub s3://${AthenaResultsBucket}/athena-results/
          EncryptionConfiguration:
            EncryptionOption: SSE_S3
        PublishCloudWatchMetricsEnabled: true
        BytesScannedCutoffPerQuery: !Ref QueryLimitGB
        RequesterPaysEnabled: false
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  GlueDatabaseName:
    Description: Glueデータベース名
    Value: !Ref AuditGlueDatabase
    Export:
      Name: !Sub ${ProjectName}-${Environment}-glue-database
  GlueTableName:
    Description: Glueテーブル名
    Value: !Ref ConsoleLoginTable
    Export:
      Name: !Sub ${ProjectName}-${Environment}-glue-table
  AthenaWorkGroup:
    Description: Athenaワークグループ名
    Value: !Ref AuditAthenaWorkGroup
    Export:
      Name: !Sub ${ProjectName}-${Environment}-athena-workgroup
  AthenaResultsBucket:
    Description: Athena結果S3バケット名
    Value: !Ref AthenaResultsBucket
    Export:
      Name: !Sub ${ProjectName}-${Environment}-athena-results-bucket
